[SystemSettings]
r.Shadow.MaxResolution=512
r.TextureStreaming=True
r.Streaming.PoolSize=2048
r.Lumen.ScreenProbeGather.TracingOctahedronResolution=8
r.Nanite.Enabled=False
r.RayTracing=False
r.AntiAliasingMethod=0
r.RenderTargetViewportSize=512

[/Script/EngineSettings.GameMapsSettings]
GameDefaultMap=/Engine/Maps/Templates/OpenWorld
; No GlobalDefaultGameMode — the project has no BP_GameMode asset. Fall back to
; the engine default GameModeBase so -game startup doesn't fail on a missing
; blueprint. The module forces a transient world at startup anyway.

[/Script/Engine.RendererSettings]
r.GenerateMeshDistanceFields=False
r.VirtualTexturedLightmaps=False
r.AllowStaticLighting=True
; Keep VRAM predictable on 8-16GB cards: no Lumen, no Nanite, no ray tracing.
; All of the above are also enforced in code; this file is the fallback.
