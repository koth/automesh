[/Script/UnrealEd.ProjectPackagingSettings]
; Source of the FShaderCodeLibrary::InitForRuntime 'bArchive' flag. When true
; the engine tries to open a packaged 'Global' shader library from Content/,
; which doesn't exist in a bare -game dev build and triggers a fatal
; "Failed to initialize ShaderCodeLibrary required by the project". Setting it
; false makes bEnable=false and skips shader library init entirely; shaders
; are then compiled online (Development build) or from source.
bShareMaterialShaderCode=False
; Belt-and-suspenders: also turn off the shared cooked-build shader code file
; and material shader code sharing, which are related packaging-only features.
bSharedMaterialNativeLibraries=False
